<text class="tiny" x="102" y="124.0" text-anchor="end">1.0</text>
<line class="axis" x1="120" y1="520" x2="1100" y2="520" />
<line class="axis" x1="120" y1="120" x2="120" y2="520" />
<text class="small" x="610.0" y="574" text-anchor="middle">Median latency per model (log scale)</text>
<text class="small" x="40" y="320.0" text-anchor="middle" transform="rotate(-90 40,320.0)">Average claimed-task score</text>
<circle cx="153.2" cy="402.4" r="12" fill="#D97706" stroke="#111827" stroke-width="2" />
<text class="label" x="169.2" y="390.4" text-anchor="start">apfel</text>
<text class="tiny" x="169.2" y="408.4" text-anchor="start">0.65 avg, 1.16s</text>
<circle cx="685.7" cy="168.8" r="10" fill="#2563EB" stroke="#111827" stroke-width="2" />
<text class="label" x="701.7" y="156.8" text-anchor="start">qwen3.5:9b</text>
<text class="tiny" x="701.7" y="174.8" text-anchor="start">0.94 avg, 12.55s</text>
<circle cx="701.0" cy="239.2" r="10" fill="#16A34A" stroke="#111827" stroke-width="2" />
<text class="label" x="717.0" y="227.2" text-anchor="start">phi4</text>
<text class="tiny" x="717.0" y="245.2" text-anchor="start">0.85 avg, 13.44s</text>
<circle cx="689.2" cy="180.0" r="10" fill="#7C3AED" stroke="#111827" stroke-width="2" />
<text class="label" x="705.2" y="168.0" text-anchor="start">qwen2.5:14b</text>
<text class="tiny" x="705.2" y="186.0" text-anchor="start">0.93 avg, 12.75s</text>
<circle cx="733.7" cy="173.6" r="10" fill="#DB2777" stroke="#111827" stroke-width="2" />
<text class="label" x="749.7" y="161.6" text-anchor="start">qwen2.5-coder:14b</text>
<text class="tiny" x="749.7" y="179.6" text-anchor="start">0.93 avg, 15.55s</text>
<circle cx="871.9" cy="234.4" r="10" fill="#DC2626" stroke="#111827" stroke-width="2" />
<text class="label" x="855.9" y="222.4" text-anchor="end">mistral-small:22b</text>
<text class="tiny" x="855.9" y="240.4" text-anchor="end">0.86 avg, 28.85s</text>
<rect class="card" x="1130" y="140" width="180" height="114" rx="18" />
<text class="label" x="1150" y="170">Read this chart</text>
<text class="small" x="1150" y="196">Upper-left is better.</text>
<text class="small" x="1150" y="220">Apfel wins speed.</text>
<text class="small" x="1150" y="244">Qwen variants win quality.</text>
<rect class="card" x="1130" y="280" width="180" height="126" rx="18" />
<text class="label" x="1150" y="310">Blocked model</text>
<text class="small" x="1150" y="336">Gemma 4 is omitted from the</text>
<text class="small" x="1150" y="356">scatter because it could not</text>
<text class="small" x="1150" y="376">complete a single valid run on</text>
<text class="small" x="1150" y="396">this Mac.</text>
</svg>
