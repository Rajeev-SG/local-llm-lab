<line class="grid" x1="120" y1="520.0" x2="1100" y2="520.0" />
<text class="tiny" x="102" y="524.0" text-anchor="end">0.5</text>
<line class="grid" x1="120" y1="440.0" x2="1100" y2="440.0" />
<text class="tiny" x="102" y="444.0" text-anchor="end">0.6</text>
<line class="grid" x1="120" y1="360.0" x2="1100" y2="360.0" />
<text class="tiny" x="102" y="364.0" text-anchor="end">0.7</text>
<line class="grid" x1="120" y1="280.0" x2="1100" y2="280.0" />
<text class="tiny" x="102" y="284.0" text-anchor="end">0.8</text>
<line class="grid" x1="120" y1="200.0" x2="1100" y2="200.0" />
<text class="tiny" x="102" y="204.0" text-anchor="end">0.9</text>
